name: Mostaql Scraper

on:
  schedule:
    - cron: "0 */4 * * *"   # Every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
  workflow_dispatch:          # Allow manual trigger from GitHub UI for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Required to commit seen_ids.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit and push seen_ids.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update seen_ids.json [skip ci]"
            git push
          else
            echo "seen_ids.json unchanged, nothing to commit"
          fi
